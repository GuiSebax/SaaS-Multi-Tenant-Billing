name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Typecheck ──────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version read from packageManager field in root package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  # ── API Tests ─────────────────────────────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # app_user is NOSUPERUSER NOBYPASSRLS — RLS is enforced on this connection.
      DATABASE_URL: postgresql://app_user:dev_password@localhost:5432/saas_test
      # postgres superuser — used by MigrationRunnerService and test beforeAll setup.
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/saas_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-minimum-32-chars-required-xx
      JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-chars-required-x
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Create app_user with NOBYPASSRLS so RLS is fully enforced in tests.
      # DEFAULT PRIVILEGES ensures future tables created by postgres (including
      # test tables created in beforeAll) are automatically accessible by app_user.
      - name: Create app_user and configure default privileges
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d saas_test <<-'SQL'
            CREATE USER app_user
              WITH PASSWORD 'dev_password'
                   NOSUPERUSER NOCREATEDB NOCREATEROLE
                   LOGIN NOBYPASSRLS;
            GRANT USAGE ON SCHEMA public TO app_user;
            ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public
              GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
            ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public
              GRANT USAGE, SELECT ON SEQUENCES TO app_user;
          SQL

      # Run as postgres (superuser) so it has the privileges to create types/tables.
      # DATABASE_URL is overridden just for this step.
      - name: Apply Drizzle schema
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas_test
        run: pnpm drizzle-kit push

      # Explicit grant on tables created by the push above (DEFAULT PRIVILEGES
      # only covers future tables, not the ones just created).
      - name: Grant table access to app_user
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d saas_test <<-'SQL'
            GRANT SELECT, INSERT, UPDATE, DELETE
              ON ALL TABLES IN SCHEMA public TO app_user;
            GRANT USAGE, SELECT
              ON ALL SEQUENCES IN SCHEMA public TO app_user;
          SQL

      # Apply RLS policies, FORCE ROW LEVEL SECURITY, triggers, and indexes.
      - name: Apply RLS migration
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d saas_test \
            -f apps/api/src/database/migrations/0001_rls_and_triggers.sql

      - name: Run unit tests
        run: pnpm --filter @saas-platform/api test

      - name: Run integration tests
        run: pnpm --filter @saas-platform/api test:integration

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-api]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
